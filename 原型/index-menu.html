<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界杯活动 · 原型导航</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0B0E1A;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
  }

  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header .badge {
    display: inline-block;
    font-size: 11px;
    color: #F5C842;
    border: 1px solid rgba(245,200,66,0.3);
    background: rgba(245,200,66,0.06);
    border-radius: 20px;
    padding: 4px 14px;
    margin-bottom: 16px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .header h1 span { color: #F5C842; }
  .header p {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
  }

  .section-label {
    width: 100%;
    max-width: 700px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-left: 2px;
  }

  .cards {
    width: 100%;
    max-width: 700px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 32px;
  }
  .cards.full { grid-template-columns: 1fr; }

  .card {
    background: #131929;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 20px 22px;
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    cursor: pointer;
  }
  .card:hover {
    background: #1A2236;
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-2px);
  }
  .card:active { transform: translateY(0); }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .card-icon.gold { background: rgba(245,200,66,0.12); }
  .card-icon.blue { background: rgba(61,123,255,0.12); }
  .card-icon.green { background: rgba(0,214,143,0.12); }
  .card-icon.red { background: rgba(255,77,106,0.12); }
  .card-icon.purple { background: rgba(160,90,255,0.12); }

  .card-info { flex: 1; min-width: 0; }
  .card-info h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-info p {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-arrow {
    color: rgba(255,255,255,0.2);
    font-size: 16px;
    flex-shrink: 0;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 6px;
    font-weight: 600;
    letter-spacing: 0.04em;
    margin-left: 6px;
    vertical-align: middle;
  }
  .tag.mobile { background: rgba(0,214,143,0.15); color: #00D68F; }
  .tag.desktop { background: rgba(61,123,255,0.15); color: #3D7BFF; }
  .tag.admin { background: rgba(255,77,106,0.12); color: #FF4D6A; }

  .divider {
    width: 100%;
    max-width: 700px;
    height: 1px;
    background: rgba(255,255,255,0.06);
    margin-bottom: 32px;
  }

  .footer {
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    margin-top: 16px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="badge">⚽ BitTap · 2026 World Cup</div>
  <h1>活动原型 <span>导航</span></h1>
  <p>内部设计对齐 · 活动时间 2026/06/12—07/19</p>
</div>

<div class="section-label">前端</div>
<div class="cards">
  <a class="card" href="index.html">
    <div class="card-icon gold">📱</div>
    <div class="card-info">
      <h3>活动主页 <span class="tag mobile">Mobile</span></h3>
      <p>用户端完整活动页面</p>
    </div>
    <span class="card-arrow">›</span>
  </a>
  <a class="card" href="match-states.html">
    <div class="card-icon green">⚽</div>
    <div class="card-info">
      <h3>赛事卡片状态 <span class="tag mobile">Mobile</span></h3>
      <p>7种卡片状态展示</p>
    </div>
    <span class="card-arrow">›</span>
  </a>
  <a class="card" href="match-states-web.html">
    <div class="card-icon blue">🖥️</div>
    <div class="card-info">
      <h3>赛事卡片状态 <span class="tag desktop">Desktop</span></h3>
      <p>单场/休赛日桌面布局</p>
    </div>
    <span class="card-arrow">›</span>
  </a>
</div>

<div class="section-label">后台</div>
<div class="cards">
  <a class="card" href="admin.html">
    <div class="card-icon red">🛠️</div>
    <div class="card-info">
      <h3>运营后台 <span class="tag admin">Admin</span></h3>
      <p>赛事管理 · 数据概览</p>
    </div>
    <span class="card-arrow">›</span>
  </a>
  <a class="card" href="admin.html?page=reward">
    <div class="card-icon purple">🏆</div>
    <div class="card-info">
      <h3>奖励审核 <span class="tag admin">Admin</span></h3>
      <p>排行榜 BTC · 抽奖发币审核</p>
    </div>
    <span class="card-arrow">›</span>
  </a>
</div>

<p class="footer">© 2026 BitTap · Internal Prototype Only</p>

</body>
</html>
