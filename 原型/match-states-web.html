<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日竞猜 · 桌面端状态</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --gold: #F5C842; --green: #00D68F; --red: #FF4D6A;
  --bg: #0B0E1A; --card: #131929; --card2: #1A2236;
  --border: rgba(255,255,255,0.08); --text: #FFFFFF;
  --text2: rgba(255,255,255,0.6); --text3: rgba(255,255,255,0.35);
  --accent: #3D7BFF;
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, 'PingFang SC', sans-serif;
  max-width: 1200px; margin: 0 auto; padding: 40px 48px 80px;
}
.page-title {
  font-size: 11px; font-weight: 600; color: var(--text3);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 32px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.state-label {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: 1px; margin-bottom: 16px; margin-top: 40px;
  display: flex; align-items: center; gap: 8px;
}
.state-label::before { content:''; flex:1; height:1px; background:var(--border); }
.state-label::after  { content:''; flex:1; height:1px; background:var(--border); }

/* Section header */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-size: 18px; font-weight: 800;
  display: flex; align-items: center; gap: 10px;
}
.section-title::before {
  content: ''; width: 4px; height: 20px;
  background: var(--gold); border-radius: 2px;
}
.tag-live {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,77,106,0.15); color: var(--red);
  border: 1px solid rgba(255,77,106,0.3);
  border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600;
}

/* Match grid */
.match-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(2, 1fr);
}
.match-grid.single { grid-template-columns: 1fr; }

/* Match card */
.match-card {
  background: #0E1525; border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.07);
  position: relative; overflow: hidden;
}
.right-bar {
  position: absolute; left: 0; top: 16px; bottom: 16px;
  width: 3px; border-radius: 2px;
  background: linear-gradient(180deg, var(--gold), rgba(245,200,66,0.2));
}
.match-meta {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 0 24px;
}
.match-time { font-size: 12px; color: var(--text3); }
.tag-status {
  border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700;
}
.tag-live-match { background: rgba(255,77,106,0.15); color: var(--red); border: 1px solid rgba(255,77,106,0.3); }
.tag-soon { background: rgba(245,200,66,0.12); color: var(--gold); border: 1px solid rgba(245,200,66,0.25); }

.match-arena {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px;
}
.team { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 100px; }
.team-flag { font-size: 36px; }
.team-name { font-size: 16px; font-weight: 800; }
.team-odds-pill {
  font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
}
.odds-home { background: rgba(245,200,66,0.12); color: var(--gold); border: 1px solid rgba(245,200,66,0.2); }
.odds-away { background: rgba(61,123,255,0.12); color: var(--accent); border: 1px solid rgba(61,123,255,0.2); }
.vs-center { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.vs-text { font-size: 22px; font-weight: 900; color: var(--red); font-style: italic; }
.match-bonus {
  background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.2);
  border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--gold); font-weight: 600;
}

.divider-line {
  height: 1px; background: var(--border); margin: 0 20px;
  display: flex; align-items: center; justify-content: center;
}
.divider-icon {
  background: #0E1525; padding: 0 8px; font-size: 12px; color: var(--text3);
}

.bet-row { display: flex; gap: 8px; padding: 14px 20px; }
.bet-btn {
  flex: 1; border-radius: 12px; padding: 12px 8px; text-align: center; cursor: pointer;
  background: var(--card2); border: 1px solid var(--border);
}
.bet-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.bet-odds { font-size: 18px; font-weight: 800; color: var(--text); }
.bet-btn.chosen {
  background: rgba(245,200,66,0.08); border-color: rgba(245,200,66,0.4);
}
.bet-chosen-label { font-size: 10px; color: var(--gold); margin-bottom: 2px; }
.bet-odds.chosen-odds { color: var(--gold); }

.info-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: rgba(255,255,255,0.02);
  border-top: 1px solid var(--border); font-size: 12px;
}
.progress-bar-wrap { padding: 0 20px 16px; }
.progress-track {
  height: 4px; background: var(--card2); border-radius: 2px;
  position: relative; margin-bottom: 8px;
}
.progress-fill-home { position: absolute; left:0; top:0; height:100%; border-radius:2px; background: var(--gold); }
.progress-fill-away { position: absolute; right:0; top:0; height:100%; border-radius:2px; background: var(--accent); }
.progress-labels { display:flex; justify-content:space-between; font-size:12px; color:var(--text3); }
.progress-center { text-align:center; font-size:11px; color:var(--text3); }

/* Rest day */
.rest-day-card {
  border-radius: 18px;
  background: #0E1525;
  border: 1px solid rgba(255,255,255,0.07);
  padding: 72px 40px;
  display: flex; flex-direction: column; align-items: center;
  text-align: center; gap: 12px;
}
.rest-day-icon { font-size: 56px; line-height: 1; margin-bottom: 4px; }
.rest-day-title { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: 0.5px; }
.rest-day-sub { font-size: 14px; color: var(--text3); line-height: 1.7; }
.rest-day-next {
  margin-top: 16px;
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 28px;
  font-size: 13px; color: var(--text2);
}
</style>
</head>
<body>

<div class="page-title">每日竞猜 · 桌面端状态</div>

<!-- ① 今日只有一场赛事 -->
<div class="state-label">① 今日只有一场赛事</div>
<div class="section-header">
  <div class="section-title">每日竞猜</div>
  <div class="tag-live">🔴 进行中</div>
</div>
<div class="match-grid single">
  <div class="match-card">
    <div class="right-bar"></div>
    <div class="match-meta">
      <div class="match-time">今天 22:00 · 小组赛 A组</div>
      <div class="tag-status tag-live-match">竞猜中</div>
    </div>
    <div class="match-arena">
      <div class="team">
        <div class="team-flag">🇧🇷</div>
        <div class="team-name">巴西</div>
        <div class="team-odds-pill odds-home">看好 58%</div>
      </div>
      <div class="vs-center">
        <div class="vs-text">VS</div>
        <div class="match-bonus">×2 奖励</div>
      </div>
      <div class="team">
        <div class="team-flag">🇦🇷</div>
        <div class="team-name">阿根廷</div>
        <div class="team-odds-pill odds-away">看好 42%</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;padding:14px 20px;height:72px;">
      <div style="display:flex;align-items:center;gap:12px;background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.3);border-radius:14px;padding:12px 24px;">
        <span style="font-size:12px;font-weight:700;color:var(--gold)">✓ 已竞猜</span>
        <div style="width:1px;height:18px;background:rgba(245,200,66,0.25)"></div>
        <span style="font-size:16px;font-weight:700;color:var(--text)">巴西胜</span>
        <span style="font-size:16px;font-weight:800;color:var(--gold)">×2</span>
      </div>
    </div>
    <div class="info-bar">
      <span style="color:var(--text2)">我的竞猜 · 巴西胜</span>
      <span style="color:var(--green);font-weight:700">投入 1,000 · 猜对可得 +2,000</span>
    </div>
    <div class="progress-bar-wrap" style="margin-top:12px">
      <div class="progress-track">
        <div class="progress-fill-home" style="width:58%"></div>
        <div class="progress-fill-away" style="width:42%"></div>
      </div>
      <div class="progress-labels">
        <span style="color:var(--gold)">58%</span>
        <span class="progress-center">参与人数 2,341</span>
        <span style="color:var(--accent)">42%</span>
      </div>
    </div>
  </div>
</div>

<!-- ② 今日休赛 -->
<div class="state-label">② 今日休赛</div>
<div class="section-header">
  <div class="section-title">每日竞猜</div>
</div>
<div class="rest-day-card">
  <div class="rest-day-icon">🏟️</div>
  <div class="rest-day-title">今日休赛</div>
  <div class="rest-day-sub">赛程间歇，球队养精蓄锐<br>其他任务照常开放，世界币继续赚</div>
</div>

</body>
</html>
